name: packer

on:
  push:
    branches:
      - main

env:
  PRODUCT_VERSION: "latest"
  PRIMARY_REGION: eu-west-1

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest
    name: Build and distribute WireGuard AMI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.PRIMARY_REGION }}

      - name: Setup packer
        uses: hashicorp/setup-packer@main
        with:
          version: ${{ env.PRODUCT_VERSION }}

      - name: Packer init
        run: packer init .

      - name: Packer validate
        run: |
          packer validate \
            -var server_private_key='${{ secrets.SERVER_PRIVATE_KEY }}' \
            -var server_public_key='${{ secrets.SERVER_PUBLIC_KEY }}' \
            -var client_public_key='${{ secrets.CLIENT_PUBLIC_KEY }}' \
            -var region=${{ env.PRIMARY_REGION }} \
            .

      - name: Packer build
        run: |
          packer build \
            -var server_private_key='${{ secrets.SERVER_PRIVATE_KEY }}' \
            -var server_public_key='${{ secrets.SERVER_PUBLIC_KEY }}' \
            -var client_public_key='${{ secrets.CLIENT_PUBLIC_KEY }}' \
            -var region=${{ env.PRIMARY_REGION }} \
            -color=false -on-error=abort .
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.PRIMARY_REGION }}

      - name: Extract primary AMI ID and update SSM in primary region
        run: |
          PRIMARY_AMI_ID=$(jq -r '.builds[-1].artifact_id' manifest.json | cut -d: -f2)
          echo "PRIMARY_AMI_ID=${PRIMARY_AMI_ID}" >> "$GITHUB_ENV"
          echo "Primary region AMI: ${PRIMARY_AMI_ID}"
          aws ssm put-parameter \
            --name /vpn-wireguard/WIREGUARD_IMAGE \
            --value "${PRIMARY_AMI_ID}" \
            --type String \
            --overwrite \
            --region ${{ env.PRIMARY_REGION }}

      - name: Copy AMI to all other regions in parallel
        run: |
          copy_ami() {
            local region=$1
            local ami_id
            ami_id=$(aws ec2 copy-image \
              --source-region ${{ env.PRIMARY_REGION }} \
              --source-image-id "${PRIMARY_AMI_ID}" \
              --name "wireguard-server-$(date +%Y-%m-%d-%H%M)" \
              --region "${region}" \
              --query ImageId --output text)
            echo "${ami_id}" > "/tmp/ami_${region}.txt"
            echo "Copying to ${region}: ${ami_id}"
          }

          copy_ami us-east-1      &
          copy_ami eu-west-2      &
          copy_ami eu-north-1     &
          copy_ami ap-southeast-2 &
          copy_ami ca-central-1   &
          copy_ami eu-west-3      &
          wait

          echo "US_EAST_1_AMI=$(cat /tmp/ami_us-east-1.txt)"         >> "$GITHUB_ENV"
          echo "EU_WEST_2_AMI=$(cat /tmp/ami_eu-west-2.txt)"         >> "$GITHUB_ENV"
          echo "EU_NORTH_1_AMI=$(cat /tmp/ami_eu-north-1.txt)"       >> "$GITHUB_ENV"
          echo "AP_SOUTHEAST_2_AMI=$(cat /tmp/ami_ap-southeast-2.txt)" >> "$GITHUB_ENV"
          echo "CA_CENTRAL_1_AMI=$(cat /tmp/ami_ca-central-1.txt)"   >> "$GITHUB_ENV"
          echo "EU_WEST_3_AMI=$(cat /tmp/ami_eu-west-3.txt)"         >> "$GITHUB_ENV"

      - name: Wait for AMIs to be available in all regions
        run: |
          wait_for_ami() {
            local region=$1
            local ami_id=$2
            echo "Waiting for ${ami_id} in ${region}..."
            aws ec2 wait image-available --image-ids "${ami_id}" --region "${region}"
            echo "${ami_id} in ${region} is available"
          }

          wait_for_ami us-east-1      "${US_EAST_1_AMI}"      &
          wait_for_ami eu-west-2      "${EU_WEST_2_AMI}"      &
          wait_for_ami eu-north-1     "${EU_NORTH_1_AMI}"     &
          wait_for_ami ap-southeast-2 "${AP_SOUTHEAST_2_AMI}" &
          wait_for_ami ca-central-1   "${CA_CENTRAL_1_AMI}"   &
          wait_for_ami eu-west-3      "${EU_WEST_3_AMI}"      &
          wait

      - name: Update SSM in all other regions
        run: |
          update_ssm() {
            local region=$1
            local ami_id=$2
            aws ssm put-parameter \
              --name /vpn-wireguard/WIREGUARD_IMAGE \
              --value "${ami_id}" \
              --type String \
              --overwrite \
              --region "${region}"
            echo "Updated SSM in ${region}: ${ami_id}"
          }

          update_ssm us-east-1      "${US_EAST_1_AMI}"
          update_ssm eu-west-2      "${EU_WEST_2_AMI}"
          update_ssm eu-north-1     "${EU_NORTH_1_AMI}"
          update_ssm ap-southeast-2 "${AP_SOUTHEAST_2_AMI}"
          update_ssm ca-central-1   "${CA_CENTRAL_1_AMI}"
          update_ssm eu-west-3      "${EU_WEST_3_AMI}"
